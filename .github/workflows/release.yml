name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --immutable

      # Detect if this is a version bump commit (from `yarn release`)
      - name: Detect release type
        id: detect
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Check if this version is already tagged (= not a new release)
          if git tag -l "v$VERSION" | grep -q .; then
            echo "type=preview" >> "$GITHUB_OUTPUT"
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "tag=${VERSION}-preview.${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "docker_tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:preview,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}-preview.${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "type=stable" >> "$GITHUB_OUTPUT"
            echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "docker_tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.detect.outputs.docker_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=callsheet
            org.opencontainers.image.description=AI-generated daily printed briefs
            org.opencontainers.image.version=${{ steps.detect.outputs.tag }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      # Only create a GitHub Release for stable versions
      - name: Create GitHub Release
        if: steps.detect.outputs.type == 'stable'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.detect.outputs.version }}
          name: v${{ steps.detect.outputs.version }}
          generate_release_notes: true

      - name: Summary
        run: |
          echo "### Release Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Type | **${{ steps.detect.outputs.type }}** |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | \`${{ steps.detect.outputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.detect.outputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
